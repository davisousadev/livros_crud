services:
  web:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/instance:/app/instance
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
